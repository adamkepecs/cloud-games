<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#071016">
    <title>Splash</title>
    <link rel="stylesheet" href="./styles.css">
    <script src="./game.js" defer></script>
  </head>
  <body>
    <main class="game-shell" aria-label="Splash game">
      <canvas id="game" aria-label="Tap the splashes before they fade"></canvas>

      <section class="hud" aria-label="Game status">
        <div>
          <span class="label">Score</span>
          <strong id="score">0</strong>
        </div>
        <div>
          <span class="label">Wave</span>
          <strong id="wave">1</strong>
        </div>
        <button id="pause" type="button" aria-pressed="false">Pause</button>
      </section>

      <section id="startPanel" class="panel" aria-label="Start game">
        <h1>Splash</h1>
        <p>Tap each splash before it fades. Bigger splashes need more taps.</p>
        <button id="start" type="button">Start</button>
      </section>

      <section id="gameOverPanel" class="panel hidden" aria-label="Game over">
        <h2>Done</h2>
        <p id="finalScore">Score 0</p>
        <button id="restart" type="button">Play again</button>
      </section>
    </main>
  </body>
</html>
